name: Deploy with Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, vultr]  # Single remote runner on Vultr
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.0
      
      - name: Terraform Init
        run: terraform init
        env:
          TF_VAR_vultr_api_key: ${{ secrets.VULTR_API_KEY }}
          TF_VAR_porkbun_api_key: ${{ secrets.PORKBUN_API_KEY }}
      
      - name: Terraform Plan
        run: terraform plan
      
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
      
      - name: Notify Teams
        if: always()
        uses: aliencube/microsoft-teams-actions@v0.8.0
        with:
          webhook_uri: ${{ secrets.TEAMS_WEBHOOK }}
          title: "Deployment ${{ job.status }}"
          summary: "Website deployed to Vultr"